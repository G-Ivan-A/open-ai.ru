services:
  clarify-engine:
    image: ghcr.io/open-ai-ru/clarify-engine:latest
    ports:
      - "3000:3000"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434}
      - LLM_MODEL=${LLM_MODEL:-llama3.2}
      - VECTOR_DB_PATH=/data/chroma
      - UPLOAD_PATH=/data/uploads
    volumes:
      - clarify_data:/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Для GPU: раскомментировать следующие строки
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  clarify_data:
  ollama_models:
