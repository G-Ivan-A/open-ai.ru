# Starter RAG Stack: Open WebUI + Ollama
# Уровень: Starter (ноутбук / рабочий ПК, 8 ГБ RAM, без GPU)
# Сценарий: Локальный корпоративный чат с поддержкой документов

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  open_webui_data:
  ollama_models:
